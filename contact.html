    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="desktop-container">
            <div class="container-fluid">
                <!-- <nav class="desktop-nav" aria-label="Main navigation">

                <nav class="navbar navbar-expand-lg justify-content-between">
                    <a href="index.html" class="logo">
                        <img src="images/logo_zara_arakelian.svg" alt="Zara Arakelian logo">
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="#works">Works</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">About</a>

                            <li class="nav-item">
                                <a class="nav-link" href="contact.html">Contacts</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="contact-page">
        <section class="contact-section">
            <div class="container desktop-container">
                <div class="contact-layout row g-5 align-items-start">
                    <h1 class="contact-title">Contacts</h1>
                    <div class="col-12 col-lg-5">
                        <div class="contact-info">

                            <div class="contact-item">
                                <img src="images/location.svg" alt="" class="contact-icon">
                                <p>Liège, 4020, Belgium</p>
                            </div>

                            <div class="contact-item">
                                <img src="images/mail.svg" alt="" class="contact-icon">
                                <a href="mailto:zaruiarakelian@gmail.com">zaruiarakelian@gmail.com</a>
                                <p></p>
                            </div>

                            <div class="contact-item">
                                <img src="images/link.svg" alt="" class="contact-icon">
                                    <a href="https://www.behance.net/zaruiarakelian" target="_blank">Behance</a>
                                    <a href="https://www.linkedin.com/in/zarui-arakelian/" target="_blank">LinkedIn</a>
                            </div>

                        </div>
                    </div>

                    <div class="col-12 col-lg-7">
                        <form class="contact-form needs-validation" action="#" method="post" novalidate>

                            <div class="mb-4">
                                <label for="fullName" class="form-label">Your full name *</label>
                                <input type="text" class="form-control custom-input" id="fullName" name="fullName"
                                    required minlength="2">
                                <div class="invalid-feedback">
                                    Please enter your full name. *
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="email" class="form-label">E-mail *</label>
                                <input type="email" class="form-control custom-input" id="email" name="email" required>
                                <div class="invalid-feedback">
                                    Please enter a valid email address.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="brief" class="form-label">The brief *</label>
                                <textarea class="form-control custom-input custom-textarea" id="brief" name="brief"
                                    rows="7" required minlength="10"></textarea>
                                <div class="invalid-feedback">
                                    Please enter your message.
                                </div>
                            </div>
                            <div class="form-bottom">
                                <button type="submit" class="btn submit-btn">Send</button>
                                <p class="form-note">* Required fields</p>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="https://www.behance.net/zaruiarakelian">Behance</a>
                <a href="https://www.linkedin.com/in/zarui-arakelian/">Linkedin</a>
                <a href="mailto:zaruiarakelian@gmail.com">zaruiarakelian@gmail.com</a>
                <p class="copyright">© 2025 All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        (() => {
            const forms = document.querySelectorAll('.needs-validation');

            forms.forEach((form) => {
                form.addEventListener('submit', (event) => {
                    form.classList.add('was-validated');

                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                });
            });
        })();
    </script>
</body>

</html>
